<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Reviews - Admin Panel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin-style.css') }}">
</head>
<body>
    <div class="admin-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>ADMIN PANEL</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="{{ url_for('admin_dashboard') }}" class="nav-item">
                    <span class="icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="{{ url_for('admin_categories') }}" class="nav-item">
                    <span class="icon">📁</span>
                    <span>Categories</span>
                </a>
                <a href="{{ url_for('admin_products') }}" class="nav-item">
                    <span class="icon">📦</span>
                    <span>Products</span>
                </a>
                <a href="{{ url_for('admin_orders') }}" class="nav-item">
                    <span class="icon">🛒</span>
                    <span>Orders</span>
                </a>
                <a href="{{ url_for('admin_customers') }}" class="nav-item">
                    <span class="icon">👥</span>
                    <span>Customers</span>
                </a>
                <a href="{{ url_for('admin_feedback') }}" class="nav-item">
                    <span class="icon">💬</span>
                    <span>Feedback</span>
                </a>
                <a href="{{ url_for('admin_reviews') }}" class="nav-item active">
                    <span class="icon">⭐</span>
                    <span>Reviews</span>
                </a>
                <a href="{{ url_for('admin_returns_page') }}" class="nav-item">
                    <span class="icon">↩️</span>
                    <span>Returns</span>
                </a>
                <a href="{{ url_for('admin_reports') }}" class="nav-item">
                    <span class="icon">📈</span>
                    <span>Reports</span>
                </a>
                <a href="#" class="nav-item" onclick="adminLogout()">
                    <span class="icon">🚪</span>
                    <span>Logout</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Mobile Overlay -->
            <div class="admin-overlay" id="adminOverlay"></div>
            
            <!-- Top Header -->
            <header class="top-header">
                <button class="admin-hamburger" onclick="toggleAdminMenu()">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <h1>Reviews</h1>
                <div class="admin-profile">
                    <span id="adminName">Admin</span>
                </div>
            </header>

            <!-- Statistics -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="pendingCount">0</div>
                    <div class="stat-label">Pending</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="approvedCount">0</div>
                    <div class="stat-label">Approved</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="rejectedCount">0</div>
                    <div class="stat-label">Rejected</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalCount">0</div>
                    <div class="stat-label">Total</div>
                </div>
            </div>

            <!-- Filter Bar -->
            <div class="actions-bar">
                <div class="filter-buttons">
                    <button class="filter-btn active" onclick="filterReviews('')">All Reviews</button>
                    <button class="filter-btn" onclick="filterReviews('pending')">Pending</button>
                    <button class="filter-btn" onclick="filterReviews('approved')">Approved</button>
                    <button class="filter-btn" onclick="filterReviews('rejected')">Rejected</button>
                </div>
            </div>

            <!-- Reviews List -->
            <section class="dashboard-section">
                <div id="reviewsContainer"></div>
                
                <!-- Pagination Controls -->
                <div id="reviewPaginationControls" style="display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 20px; padding: 15px; background: #f9f9f9; border-radius: 5px;">
                    <button id="reviewPrevBtn" class="btn-primary" onclick="reviewPreviousPage()">← Previous</button>
                    <span id="reviewPageInfo" style="font-weight: bold; min-width: 100px; text-align: center;">Page 1 of 1</span>
                    <button id="reviewNextBtn" class="btn-primary" onclick="reviewNextPage()">Next →</button>
                </div>
            </section>
        </div>
    </div>

    <!-- Review Details Modal -->
    <div id="reviewDetailsModal" class="review-details-modal">
        <div class="review-modal-content">
            <div class="review-modal-header">
                <h2>Review Details</h2>
                <span class="review-modal-close" onclick="closeReviewModal()">&times;</span>
            </div>
            
            <div class="review-modal-body">
                <div id="reviewDetailContent">
                    <!-- Content will be populated by JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/common.js') }}"></script>
    <script src="{{ url_for('static', filename='js/admin-common.js') }}"></script>
    <script src="{{ url_for('static', filename='js/admin-reviews.js') }}"></script>
</body>
</html>
