<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Orders - Admin Panel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin-style.css') }}">
</head>
<body>
    <div class="admin-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>ADMIN PANEL</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="{{ url_for('admin_dashboard') }}" class="nav-item">
                    <span class="icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="{{ url_for('admin_categories') }}" class="nav-item">
                    <span class="icon">📁</span>
                    <span>Categories</span>
                </a>
                <a href="{{ url_for('admin_products') }}" class="nav-item">
                    <span class="icon">📦</span>
                    <span>Products</span>
                </a>
                <a href="{{ url_for('admin_orders') }}" class="nav-item active">
                    <span class="icon">🛒</span>
                    <span>Orders</span>
                </a>
                <a href="{{ url_for('admin_customers') }}" class="nav-item">
                    <span class="icon">👥</span>
                    <span>Customers</span>
                </a>
                <a href="{{ url_for('admin_feedback') }}" class="nav-item">
                    <span class="icon">💬</span>
                    <span>Feedback</span>
                </a>
                <a href="{{ url_for('admin_reviews') }}" class="nav-item">
                    <span class="icon">⭐</span>
                    <span>Reviews</span>
                </a>
                <a href="{{ url_for('admin_returns_page') }}" class="nav-item">
                    <span class="icon">↩️</span>
                    <span>Returns</span>
                </a>
                <a href="{{ url_for('admin_reports') }}" class="nav-item">
                    <span class="icon">📈</span>
                    <span>Reports</span>
                </a>
                <a href="#" class="nav-item" onclick="adminLogout()">
                    <span class="icon">🚪</span>
                    <span>Logout</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Mobile Overlay -->
            <div class="admin-overlay" id="adminOverlay"></div>
            
            <!-- Top Header -->
            <header class="top-header">
                <button class="admin-hamburger" onclick="toggleAdminMenu()">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <h1>Orders</h1>
                <div class="admin-profile">
                    <span id="adminName">Admin</span>
                </div>
            </header>

            <!-- Filter Bar -->
            <div class="actions-bar">
                <div class="filter-buttons">
                    <button class="filter-btn active" onclick="filterOrders('all')">All Orders</button>
                    <button class="filter-btn" onclick="filterOrders('pending')">Pending</button>
                    <button class="filter-btn" onclick="filterOrders('processing')">Processing</button>
                    <button class="filter-btn" onclick="filterOrders('delivered')">Delivered</button>
                </div>
                <div class="search-box">
                    <input type="text" id="searchOrder" placeholder="Search orders..." onkeyup="searchOrders()">
                </div>
            </div>

            <!-- Orders Table -->
            <section class="dashboard-section">
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Order ID</th>
                                <th>Customer</th>
                                <th>Items</th>
                                <th>Total Amount</th>
                                <th>Order Date</th>
                                <th>Status</th>
                                <th>Payment</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="ordersTable">
                            <tr>
                                <td colspan="8" style="text-align: center;">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <!-- Pagination Controls -->
                <div id="paginationControls" style="display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 20px; padding: 15px; background: #f9f9f9; border-radius: 5px;">
                    <button id="prevBtn" class="btn-primary" onclick="previousPage()">← Previous</button>
                    <span id="pageInfo" style="font-weight: bold; min-width: 100px; text-align: center;">Page 1 of 1</span>
                    <button id="nextBtn" class="btn-primary" onclick="nextPage()">Next →</button>
                </div>
            </section>
        </div>
    </div>

    <!-- Order Details Modal -->
    <div id="orderModal" class="modal">
        <div class="modal-content modal-large">
            <span class="close" onclick="closeOrderModal()">&times;</span>
            <h2>Order Details</h2>
            
            <div id="orderDetailsContent">
                <!-- Order details will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Update Status Modal -->
    <div id="statusModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeStatusModal()">&times;</span>
            <h2>Update Order Status</h2>
            
            <form id="statusForm" onsubmit="updateOrderStatus(event)">
                <input type="hidden" id="statusOrderId">
                
                <div class="form-group">
                    <label for="orderStatus">New Status</label>
                    <select id="orderStatus" required>
                        <option value="pending">Pending</option>
                        <option value="processing">Processing</option>
                        <option value="delivered">Delivered</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeStatusModal()">Cancel</button>
                    <button type="submit" class="btn-primary" id="updateStatusBtn">Update Status</button>
                </div>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/common.js') }}"></script>
    <script src="{{ url_for('static', filename='js/admin-common.js') }}"></script>
    <script src="{{ url_for('static', filename='js/admin-orders.js') }}"></script>
</body>
</html>
